<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Church of Ink</title>
  <meta name="description" content="Sacred work, inscribed on skin. Coming soon.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="The Church of Ink">
  <meta property="og:description" content="Sacred work, inscribed on skin. Coming soon.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    /* --- Reset --- */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* --- Body --- */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Background texture --- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(232, 228, 224, 0.03) 1px, transparent 1px);
      background-size: 4px 4px;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: fade-in 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) 0.8s forwards;
    }

    /* --- Content wrapper --- */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 2rem;
    }

    /* --- Ink-in-water background --- */
    .ink-water {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      animation: fade-in 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) 0.8s forwards;
    }

    .ink-water::before,
    .ink-water::after {
      content: '';
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
    }

    .ink-water::before {
      background:
        radial-gradient(ellipse 35% 30% at 45% 50%, rgba(123, 94, 167, 0.18), transparent 70%),
        radial-gradient(ellipse 25% 35% at 60% 40%, rgba(100, 75, 145, 0.12), transparent 65%),
        radial-gradient(ellipse 40% 25% at 35% 60%, rgba(80, 65, 120, 0.10), transparent 60%);
      animation: ink-drift-1 45s ease-in-out infinite;
    }

    .ink-water::after {
      background:
        radial-gradient(ellipse 30% 40% at 55% 55%, rgba(123, 94, 167, 0.14), transparent 65%),
        radial-gradient(ellipse 40% 30% at 40% 45%, rgba(90, 70, 135, 0.10), transparent 60%);
      animation: ink-drift-2 60s ease-in-out infinite;
    }

    /* --- Hand watermark --- */
    .hand-watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: auto;
      height: 75vh;
      opacity: 0;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 0;
      animation: fade-in 2s cubic-bezier(0.25, 0.1, 0.25, 1) 1.0s forwards;
    }

    .hand-watermark img {
      height: 100%;
      width: auto;
      opacity: 0.03;
    }

    /* --- Wordmark --- */
    .wordmark {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #e8e4e0;
      line-height: 1.2;
      text-align: center;
      clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
      animation: inscribe 1s cubic-bezier(0.25, 0.1, 0.25, 1) 1.5s forwards;
    }

    /* --- Divider --- */
    .divider {
      width: 60px;
      height: 1px;
      background-color: rgba(232, 228, 224, 0.35);
      margin: 1.5rem auto;
      transform: scaleX(0);
      animation: draw-line 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) 2.8s forwards;
    }

    /* --- Tagline --- */
    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.3rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.15em;
      color: rgba(232, 228, 224, 0.65);
      opacity: 0;
      transform: translateY(8px);
      animation: drift-up 0.6s cubic-bezier(0.25, 0.1, 0.25, 1) 3.4s forwards;
    }

    /* --- Coming Soon --- */
    .coming-soon {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232, 228, 224, 0.35);
      margin-top: 4rem;
      opacity: 0;
      transform: translateY(4px);
      animation: drift-up 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) 5.0s forwards;
    }

    /* --- Scripture reference --- */
    .scripture {
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.08em;
      color: rgba(232, 228, 224, 0.25);
      margin-top: 0.75rem;
      opacity: 0;
      animation: fade-in 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) 5.5s forwards;
    }

    /* --- Keyframes --- */
    @keyframes inscribe {
      from { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
      to   { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    }

    @keyframes draw-line {
      to { transform: scaleX(1); }
    }

    @keyframes fade-in {
      to { opacity: 1; }
    }

    @keyframes drift-up {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes ink-drift-1 {
      0%   { transform: translate(0%, 0%) scale(1); }
      25%  { transform: translate(10%, -8%) scale(1.15); }
      50%  { transform: translate(-8%, 10%) scale(0.9); }
      75%  { transform: translate(5%, -4%) scale(1.1); }
      100% { transform: translate(0%, 0%) scale(1); }
    }

    @keyframes ink-drift-2 {
      0%   { transform: translate(0%, 0%) scale(1); }
      33%  { transform: translate(-10%, 8%) scale(1.2); }
      66%  { transform: translate(8%, -10%) scale(0.85); }
      100% { transform: translate(0%, 0%) scale(1); }
    }

    /* --- Reduced motion --- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
        transform: none !important;
        clip-path: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="content">
    <div class="ink-water"></div>
    <div class="hand-watermark"><img src="assets/hand-watermark.png" alt=""></div>
    <h1 class="wordmark">The Church of Ink</h1>
    <div class="divider"></div>
    <p class="tagline">Sacred work, inscribed on skin.</p>
    <p class="coming-soon">Coming Soon</p>
    <p class="scripture">Isaiah 49:16</p>
  </main>
</body>
</html>
